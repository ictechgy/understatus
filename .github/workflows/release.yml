name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and upload (e.g. v0.7.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    # Both macOS targets are built on the Apple Silicon runner (macos-14).
    # x86_64 is cross-compiled (the macOS SDK frameworks are universal), which
    # avoids depending on the increasingly scarce macos-13 Intel runners.
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Verify release version contract
        run: node npm/verify-release.js "${TAG#v}"

      - name: Rust toolchain (+ target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION=${TAG#v}
          cd target/${{ matrix.target }}/release
          tar czf understatus-${VERSION}-${{ matrix.target }}.tar.gz understatus
          shasum -a 256 understatus-${VERSION}-${{ matrix.target }}.tar.gz > understatus-${VERSION}-${{ matrix.target }}.tar.gz.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          files: |
            target/${{ matrix.target }}/release/understatus-*-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/understatus-*-${{ matrix.target }}.tar.gz.sha256
          fail_on_unmatched_files: true
